name: Deploy to dev

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  PROJECT: rei
  ENV: dev

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]
      fail-fast: false

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHA}" >> "$GITHUB_OUTPUT"
          echo "repo=${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT }}/${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: app/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.meta.outputs.repo }}:latest
            ${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}

  deploy:
    name: Deploy ECS (${{ matrix.service }})
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]
      fail-fast: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get current task definition
        id: get-taskdef
        run: |
          aws ecs describe-task-definition \
            --task-definition "rei-${{ matrix.service }}-${{ env.ENV }}" \
            --query taskDefinition \
            > /tmp/taskdef.json
          echo "family=$(jq -r .family /tmp/taskdef.json)" >> "$GITHUB_OUTPUT"

      - name: Update image in task definition
        id: render-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/taskdef.json
          container-name: ${{ matrix.service }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT }}/${{ matrix.service }}:latest

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-taskdef.outputs.task-definition }}
          service: rei-${{ matrix.service }}-${{ env.ENV }}
          cluster: rei-ecs-${{ env.ENV }}
          wait-for-service-stability: true
