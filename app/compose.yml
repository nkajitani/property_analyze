services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rei_user
      POSTGRES_PASSWORD: rei_password
      POSTGRES_DB: rei_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rei_user -d rei_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/work
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./frontend:/work
      - /work/node_modules
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8000
    command: sh -c "bun install && bun run dev"

  claude:
    image: base-claude
    volumes:
      - ./.claude:/root/.claude
      - .:/work
      # ベースとなるエージェント・スキルのみマウント先を切り替え
      - ~/docker/claude/base/.claude/agents:/root/.claude/agents
      - ~/docker/claude/base/.claude/skills:/root/.claude/skills
      - ~/docker/claude/base/.claude/CLAUDE.md:/root/.claude/CLAUDE.md
      - ~/docker/claude/base/.claude/settings.json:/root/.claude/settings.json
      - ~/docker/claude/base/.claude/statusline-command.sh:/root/.claude/statusline-command.sh
volumes:
  postgres_data:
